<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Como Aplicar Tags nos Cards de Oportunidades | Full Funnel</title>
<style>
  :root {
    --primary: #7c3aed;
    --primary-light: #a78bfa;
    --hotspot: #ef4444;
    --bg: #0f0f1a;
    --card-bg: #1a1a2e;
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --border: #2d2d44;
    --tooltip-bg: #ffffff;
    --tooltip-text: #1e293b;
    --radius: 12px;
    --shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .header {
    position: fixed; top: 0; left: 0; right: 0;
    padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(15,15,26,0.9);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    z-index: 100;
  }
  .header-brand {
    display: flex; align-items: center; gap: 10px;
    font-weight: 700; font-size: 16px; color: var(--primary-light);
  }
  .header-brand svg { width: 24px; height: 24px; }
  .header-title { font-size: 14px; color: var(--text-muted); }
  .header-steps {
    font-size: 13px; color: var(--text-muted);
    background: var(--card-bg); padding: 6px 14px;
    border-radius: 20px; border: 1px solid var(--border);
  }
  .container {
    width: 100%; max-width: 1200px;
    padding: 80px 24px 120px; position: relative;
  }
  .screenshot-wrapper {
    position: relative; width: 100%;
    border-radius: var(--radius); overflow: visible;
    box-shadow: var(--shadow); border: 1px solid var(--border);
    background: var(--card-bg);
  }
  .screenshot-wrapper img {
    width: 100%; display: block;
    border-radius: var(--radius);
    transition: opacity 0.4s ease;
  }
  .screenshot-wrapper img.fade-out { opacity: 0; }
  .screenshot-wrapper img.fade-in { opacity: 1; }

  .hotspot {
    position: absolute;
    border: 3px solid var(--hotspot);
    border-radius: 6px;
    background: rgba(239, 68, 68, 0.08);
    cursor: pointer;
    transition: all 0.4s ease; z-index: 10;
  }
  .hotspot::before {
    content: ''; position: absolute; inset: -6px;
    border-radius: 8px;
    border: 2px solid rgba(239, 68, 68, 0.3);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.05); opacity: 0; }
  }

  .tooltip {
    position: absolute; z-index: 20;
    background: var(--tooltip-bg); color: var(--tooltip-text);
    padding: 14px 16px; border-radius: 10px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    max-width: 320px; min-width: 220px;
    transition: left 0.15s ease, top 0.15s ease;
    overflow-wrap: break-word;
    overflow: visible;
  }
  .tooltip-step {
    display: inline-block;
    background: var(--primary); color: white;
    font-size: 11px; font-weight: 700;
    padding: 3px 8px; border-radius: 4px;
    margin-bottom: 8px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .tooltip-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; line-height: 1.3; }
  .tooltip-text { font-size: 13px; color: #64748b; line-height: 1.5; }
  .tooltip-tip {
    margin-top: 10px; padding: 8px 10px;
    background: #f0f9ff; border-left: 3px solid #3b82f6;
    border-radius: 4px; font-size: 12px;
    color: #1e40af; line-height: 1.4;
  }

  .connector-svg {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 15;
    overflow: visible;
  }

  .nav-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(15,15,26,0.95);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border); z-index: 100;
  }
  .nav-btn {
    padding: 10px 24px; border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card-bg); color: var(--text);
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 8px;
  }
  .nav-btn:hover { background: #252540; border-color: var(--primary); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .nav-btn:disabled:hover { background: var(--card-bg); border-color: var(--border); }
  .nav-btn.primary { background: var(--primary); border-color: var(--primary); color: white; }
  .nav-btn.primary:hover { background: #6d28d9; }
  .progress { display: flex; align-items: center; gap: 6px; }
  .progress-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--border); transition: all 0.3s; cursor: pointer;
  }
  .progress-dot.active { background: var(--primary); width: 24px; border-radius: 4px; }
  .progress-dot.completed { background: var(--primary-light); }
  @media (max-width: 768px) {
    .container { padding: 70px 12px 100px; }
    .tooltip { max-width: 260px; min-width: 180px; padding: 12px 14px; }
    .tooltip-title { font-size: 14px; }
    .tooltip-text { font-size: 12px; }
    .header-title { display: none; }
    .nav-btn { padding: 8px 16px; font-size: 13px; }
  }
  .intro-overlay {
    position: fixed; inset: 0;
    background: rgba(15,15,26,0.95);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; transition: opacity 0.4s;
  }
  .intro-overlay.hidden { opacity: 0; pointer-events: none; }
  .intro-card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 16px; padding: 40px;
    text-align: center; max-width: 500px;
    box-shadow: var(--shadow);
  }
  .intro-card h1 {
    font-size: 24px; margin-bottom: 12px;
    background: linear-gradient(135deg, var(--primary-light), #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .intro-card p { color: var(--text-muted); font-size: 15px; margin-bottom: 8px; line-height: 1.5; }
  .intro-card .steps-count { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
  .intro-start {
    padding: 12px 32px; border-radius: 8px; border: none;
    background: var(--primary); color: white;
    font-size: 16px; font-weight: 700; cursor: pointer;
    transition: background 0.2s;
  }
  .intro-start:hover { background: #6d28d9; }
</style>
</head>
<body>

<div class="intro-overlay" id="intro">
  <div class="intro-card">
    <h1>🏷️ Como Aplicar Tags nos Cards de Oportunidades</h1>
    <p>Aprenda a organizar suas oportunidades usando tags (etiquetas) para classificar e filtrar seus leads no pipeline.</p>
    <p class="steps-count">📋 6 passos • ⏱️ ~3 min</p>
    <button class="intro-start" onclick="startTutorial()">Começar Tutorial →</button>
  </div>
</div>

<div class="header">
  <a href="/" class="header-brand" style="text-decoration:none;color:inherit;">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    Full Funnel
  </a>
  <div class="header-title">Como Aplicar Tags nos Cards de Oportunidades</div>
  <div class="header-steps" id="header-steps">Passo 1 de 6</div>
</div>

<div class="container">
  <div class="screenshot-wrapper" id="screenshot-wrapper">
    <img id="screenshot" src="" alt="Screenshot do passo">
    <div class="hotspot" id="hotspot" onclick="nextStep()"></div>
    <svg class="connector-svg" id="connector-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
      <line id="connector" stroke="#ef4444" stroke-width="0.3" stroke-dasharray="1.2,0.8" stroke-linecap="round"/>
    </svg>
    <div class="tooltip" id="tooltip">
      <div class="tooltip-step" id="tooltip-step"></div>
      <div class="tooltip-title" id="tooltip-title"></div>
      <div class="tooltip-text" id="tooltip-text"></div>
      <div class="tooltip-tip" id="tooltip-tip" style="display:none;"></div>
    </div>
  </div>
</div>

<div class="nav-bar">
  <button class="nav-btn" id="btn-prev" onclick="prevStep()">← Anterior</button>
  <div class="progress" id="progress"></div>
  <button class="nav-btn primary" id="btn-next" onclick="nextStep()">Próximo →</button>
</div>

<script>
const STEPS = [
  {
    image: "passo-01.png",
    hotspot: { x: 3, y: 41.5, w: 12, h: 4.5 },
    tooltip: { x: 18, y: 30 },
    line: { x1: 15, y1: 44, x2: 18, y2: 36 },
    title: "Acesse a seção 'Leads' no menu lateral",
    text: "No menu lateral esquerdo, clique em 'Leads'. Esta seção contém todas as suas pipelines e oportunidades de venda organizadas no formato Kanban.",
    tip: "💡 A seção de Leads é onde você gerencia todo o seu funil comercial — desde prospects até clientes fechados."
  },
  {
    image: "passo-02.png",
    hotspot: { x: 18, y: 12, w: 17, h: 18 },
    tooltip: { x: 40, y: 8 },
    line: { x1: 35, y1: 20, x2: 40, y2: 14 },
    title: "Selecione a pipeline desejada",
    text: "Clique no seletor de pipeline (dropdown) para escolher em qual pipeline você quer trabalhar. Cada pipeline representa um funil diferente — comercial, suporte, etc.",
    tip: "💡 Neste exemplo, vamos usar o 'Funil Comercial' que já possui oportunidades cadastradas. Escolha a pipeline que melhor se aplica ao seu caso."
  },
  {
    image: "passo-01.png",
    hotspot: { x: 17.5, y: 38, w: 19, h: 13 },
    tooltip: { x: 40, y: 30 },
    line: { x1: 27, y1: 45, x2: 40, y2: 36 },
    title: "Identifique e clique no card da oportunidade",
    text: "No kanban, localize o card da oportunidade que deseja etiquetar. Cada card mostra o nome do contato, valor e ícones de ações. Clique no card para abrir os detalhes.",
    tip: "💡 Os cards são organizados por colunas (fases). Você pode arrastar cards entre colunas para mudar a fase da oportunidade."
  },
  {
    image: "passo-05.png",
    hotspot: { x: 32, y: 74, w: 6, h: 8 },
    tooltip: { x: 55, y: 55 },
    line: { x1: 38, y1: 78, x2: 55, y2: 65 },
    title: "Encontre o campo 'Tags' nos detalhes",
    text: "No modal de edição da oportunidade, role para baixo até encontrar o campo 'Tags'. Ele fica abaixo dos campos de Status, Valor, Proprietário e Fonte da oportunidade.",
    tip: "💡 Se não estiver vendo o campo Tags, desmarque a opção 'Ocultar campos vazios' no canto superior direito do modal."
  },
  {
    image: "passo-06.png",
    hotspot: { x: 32.5, y: 45, w: 20, h: 34 },
    tooltip: { x: 57, y: 30 },
    line: { x1: 42, y1: 55, x2: 57, y2: 40 },
    title: "Selecione ou crie uma tag",
    text: "Ao clicar no campo Tags, um dropdown será aberto mostrando todas as tags disponíveis. Selecione uma tag existente ou digite uma nova palavra-chave para criar uma tag personalizada.",
    tip: "💡 Use o campo 'Pesquisar / Criar palavras-chave' para buscar tags existentes ou criar novas. Tags são ótimas para categorizar oportunidades por tipo, campanha, prioridade, etc."
  },
  {
    image: "passo-05.png",
    hotspot: { x: 72, y: 85, w: 8, h: 5 },
    tooltip: { x: 35, y: 45 },
    line: { x1: 76, y1: 88, x2: 55, y2: 58 },
    title: "Clique em 'Atualizar' para salvar! 🎉",
    text: "Após selecionar as tags desejadas, clique no botão azul 'Atualizar' para salvar as alterações. A tag será aplicada ao card da oportunidade e você poderá usá-la para filtrar e organizar seu pipeline.",
    tip: "💡 Depois de aplicar tags, você pode usar os 'Filtros avançados' na tela do kanban para filtrar oportunidades por tag específica. Isso facilita muito a gestão do seu funil!"
  }
];

let currentStep = 0;

function clampTooltip() {
  const wrapper = document.getElementById('screenshot-wrapper');
  const tt = document.getElementById('tooltip');
  if (!wrapper || !tt) return;
  const wR = wrapper.getBoundingClientRect();
  const tR = tt.getBoundingClientRect();
  if (wR.width === 0 || wR.height === 0) return;
  const pad = 6;
  let leftPx = tR.left - wR.left;
  let topPx = tR.top - wR.top;
  if (leftPx + tR.width > wR.width - pad) leftPx = wR.width - tR.width - pad;
  if (topPx + tR.height > wR.height - pad) topPx = wR.height - tR.height - pad;
  if (leftPx < pad) leftPx = pad;
  if (topPx < pad) topPx = pad;
  tt.style.left = ((leftPx / wR.width) * 100) + '%';
  tt.style.top = ((topPx / wR.height) * 100) + '%';
}

function init() {
  const progress = document.getElementById('progress');
  STEPS.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'progress-dot';
    dot.onclick = () => goToStep(i);
    progress.appendChild(dot);
  });
}

function startTutorial() {
  document.getElementById('intro').classList.add('hidden');
  goToStep(0);
}

function goToStep(index) {
  if (index < 0 || index >= STEPS.length) return;
  const step = STEPS[index];
  const img = document.getElementById('screenshot');
  const hotspot = document.getElementById('hotspot');
  const tooltip = document.getElementById('tooltip');
  const line = document.getElementById('connector');

  img.classList.add('fade-out');
  img.classList.remove('fade-in');

  setTimeout(() => {
    img.src = step.image;
    img.onload = () => {
      img.classList.remove('fade-out');
      img.classList.add('fade-in');
    };

    hotspot.style.left = step.hotspot.x + '%';
    hotspot.style.top = step.hotspot.y + '%';
    hotspot.style.width = step.hotspot.w + '%';
    hotspot.style.height = step.hotspot.h + '%';

    tooltip.style.left = step.tooltip.x + '%';
    tooltip.style.top = step.tooltip.y + '%';

    line.setAttribute('x1', step.line.x1);
    line.setAttribute('y1', step.line.y1);
    line.setAttribute('x2', step.line.x2);
    line.setAttribute('y2', step.line.y2);

    setTimeout(() => clampTooltip(), 200);
    setTimeout(() => clampTooltip(), 500);

    document.getElementById('tooltip-step').textContent = `Passo ${index + 1} de ${STEPS.length}`;
    document.getElementById('tooltip-title').textContent = step.title;
    document.getElementById('tooltip-text').textContent = step.text;
    const tipEl = document.getElementById('tooltip-tip');
    if (step.tip) {
      tipEl.textContent = step.tip;
      tipEl.style.display = 'block';
    } else {
      tipEl.style.display = 'none';
    }

    document.getElementById('header-steps').textContent = `Passo ${index + 1} de ${STEPS.length}`;
    document.querySelectorAll('.progress-dot').forEach((dot, i) => {
      dot.className = 'progress-dot';
      if (i < index) dot.classList.add('completed');
      if (i === index) dot.classList.add('active');
    });

    document.getElementById('btn-prev').disabled = index === 0;
    const btnNext = document.getElementById('btn-next');
    if (index === STEPS.length - 1) {
      btnNext.innerHTML = '✅ Concluir';
      btnNext.onclick = () => { goToStep(0); document.getElementById('intro').classList.remove('hidden'); };
    } else {
      btnNext.innerHTML = 'Próximo →';
      btnNext.onclick = nextStep;
    }
    currentStep = index;
  }, 200);
}

function nextStep() { goToStep(currentStep + 1); }
function prevStep() { goToStep(currentStep - 1); }

document.addEventListener('keydown', (e) => {
  if (document.getElementById('intro').classList.contains('hidden')) {
    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextStep(); }
    if (e.key === 'ArrowLeft') { e.preventDefault(); prevStep(); }
  } else {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); startTutorial(); }
  }
});

init();
</script>
</body>
</html>
