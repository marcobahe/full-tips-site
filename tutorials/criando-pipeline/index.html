<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Como Criar sua Primeira Pipeline de Vendas | Full Funnel</title>
<style>
  :root {
    --primary: #7c3aed;
    --primary-light: #a78bfa;
    --hotspot: #ef4444;
    --bg: #0f0f1a;
    --card-bg: #1a1a2e;
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --border: #2d2d44;
    --tooltip-bg: #ffffff;
    --tooltip-text: #1e293b;
    --radius: 12px;
    --shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .header {
    position: fixed; top: 0; left: 0; right: 0;
    padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(15,15,26,0.9);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    z-index: 100;
  }
  .header-brand {
    display: flex; align-items: center; gap: 10px;
    font-weight: 700; font-size: 16px; color: var(--primary-light);
  }
  .header-brand svg { width: 24px; height: 24px; }
  .header-title { font-size: 14px; color: var(--text-muted); }
  .header-steps {
    font-size: 13px; color: var(--text-muted);
    background: var(--card-bg); padding: 6px 14px;
    border-radius: 20px; border: 1px solid var(--border);
  }
  .container {
    width: 100%; max-width: 1200px;
    padding: 80px 24px 120px; position: relative;
  }
  .screenshot-wrapper {
    position: relative; width: 100%;
    border-radius: var(--radius); overflow: hidden;
    box-shadow: var(--shadow); border: 1px solid var(--border);
    background: var(--card-bg);
  }
  .screenshot-wrapper img {
    width: 100%; display: block;
    border-radius: var(--radius);
    transition: opacity 0.4s ease;
  }
  .screenshot-wrapper img.fade-out { opacity: 0; }
  .screenshot-wrapper img.fade-in { opacity: 1; }

  /* Frame retangular no ponto de clique */
  .hotspot {
    position: absolute;
    border: 3px solid var(--hotspot);
    border-radius: 6px;
    background: rgba(239, 68, 68, 0.08);
    cursor: pointer;
    transition: all 0.4s ease; z-index: 10;
  }
  .hotspot::before {
    content: ''; position: absolute; inset: -6px;
    border-radius: 8px;
    border: 2px solid rgba(239, 68, 68, 0.3);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.05); opacity: 0; }
  }

  .tooltip {
    position: absolute; z-index: 20;
    background: var(--tooltip-bg); color: var(--tooltip-text);
    padding: 14px 16px; border-radius: 10px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    max-width: 320px; min-width: 220px;
    transition: left 0.3s ease, top 0.3s ease;
    overflow-wrap: break-word;
  }
  .tooltip-step {
    display: inline-block;
    background: var(--primary); color: white;
    font-size: 11px; font-weight: 700;
    padding: 3px 8px; border-radius: 4px;
    margin-bottom: 8px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .tooltip-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; line-height: 1.3; }
  .tooltip-text { font-size: 13px; color: #64748b; line-height: 1.5; }
  .tooltip-tip {
    margin-top: 10px; padding: 8px 10px;
    background: #f0f9ff; border-left: 3px solid #3b82f6;
    border-radius: 4px; font-size: 12px;
    color: #1e40af; line-height: 1.4;
  }

  /* Linha tracejada SVG — viewBox percentual */
  .connector-svg {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 15;
    overflow: visible;
  }

  .nav-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(15,15,26,0.95);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border); z-index: 100;
  }
  .nav-btn {
    padding: 10px 24px; border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card-bg); color: var(--text);
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 8px;
  }
  .nav-btn:hover { background: #252540; border-color: var(--primary); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .nav-btn:disabled:hover { background: var(--card-bg); border-color: var(--border); }
  .nav-btn.primary { background: var(--primary); border-color: var(--primary); color: white; }
  .nav-btn.primary:hover { background: #6d28d9; }
  .progress { display: flex; align-items: center; gap: 6px; }
  .progress-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--border); transition: all 0.3s; cursor: pointer;
  }
  .progress-dot.active { background: var(--primary); width: 24px; border-radius: 4px; }
  .progress-dot.completed { background: var(--primary-light); }
  @media (max-width: 768px) {
    .container { padding: 70px 12px 100px; }
    .tooltip { max-width: 260px; min-width: 180px; padding: 12px 14px; }
    .tooltip-title { font-size: 14px; }
    .tooltip-text { font-size: 12px; }
    .header-title { display: none; }
    .nav-btn { padding: 8px 16px; font-size: 13px; }
  }
  .intro-overlay {
    position: fixed; inset: 0;
    background: rgba(15,15,26,0.95);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; transition: opacity 0.4s;
  }
  .intro-overlay.hidden { opacity: 0; pointer-events: none; }
  .intro-card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 16px; padding: 40px;
    text-align: center; max-width: 500px;
    box-shadow: var(--shadow);
  }
  .intro-card h1 {
    font-size: 24px; margin-bottom: 12px;
    background: linear-gradient(135deg, var(--primary-light), #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .intro-card p { color: var(--text-muted); font-size: 15px; margin-bottom: 8px; line-height: 1.5; }
  .intro-card .steps-count { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
  .intro-start {
    padding: 12px 32px; border-radius: 8px; border: none;
    background: var(--primary); color: white;
    font-size: 16px; font-weight: 700; cursor: pointer;
    transition: background 0.2s;
  }
  .intro-start:hover { background: #6d28d9; }
</style>
</head>
<body>

<div class="intro-overlay" id="intro">
  <div class="intro-card">
    <h1>🚀 Como Criar sua Primeira Pipeline de Vendas</h1>
    <p>Aprenda a organizar seus leads e oportunidades com Pipelines visuais no estilo Kanban.</p>
    <p class="steps-count">📋 7 passos • ⏱️ ~3 min</p>
    <button class="intro-start" onclick="startTutorial()">Começar Tutorial →</button>
  </div>
</div>

<div class="header">
  <a href="/" class="header-brand" style="text-decoration:none;color:inherit;">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    Full Funnel
  </a>
  <div class="header-title">Como Criar sua Primeira Pipeline de Vendas</div>
  <div class="header-steps" id="header-steps">Passo 1 de 8</div>
</div>

<div class="container">
  <div class="screenshot-wrapper" id="screenshot-wrapper">
    <img id="screenshot" src="" alt="Screenshot do passo">
    <div class="hotspot" id="hotspot" onclick="nextStep()"></div>
    <svg class="connector-svg" id="connector-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
      <line id="connector" stroke="#ef4444" stroke-width="0.3" stroke-dasharray="1.2,0.8" stroke-linecap="round"/>
    </svg>
    <div class="tooltip" id="tooltip">
      <div class="tooltip-step" id="tooltip-step"></div>
      <div class="tooltip-title" id="tooltip-title"></div>
      <div class="tooltip-text" id="tooltip-text"></div>
      <div class="tooltip-tip" id="tooltip-tip" style="display:none;"></div>
    </div>
  </div>
</div>

<div class="nav-bar">
  <button class="nav-btn" id="btn-prev" onclick="prevStep()">← Anterior</button>
  <div class="progress" id="progress"></div>
  <button class="nav-btn primary" id="btn-next" onclick="nextStep()">Próximo →</button>
</div>

<script>
const STEPS = [
  {
    image: "passo-02.png",
    hotspot: { x: 0.7, y: 49, w: 14, h: 4.4 },
    tooltip: { x: 30, y: 30 },
    line: { x1: 14.7, y1: 51, x2: 30, y2: 36 },
    title: "Clique em 'Leads' no menu lateral",
    text: "No menu lateral esquerdo, clique em 'Leads'. É nessa seção que ficam as pipelines e oportunidades de venda.",
    tip: "💡 'Leads' é o termo que a Full Funnel usa para oportunidades de venda. Cada lead pode ser movido entre as etapas da sua pipeline."
  },
  {
    image: "passo-03.png",
    hotspot: { x: 25.4, y: 7.4, w: 4.4, h: 2.6 },
    tooltip: { x: 40, y: 30 },
    line: { x1: 27.6, y1: 10, x2: 40, y2: 35 },
    title: "Acesse a aba 'Pipelines'",
    text: "Na página de Leads, você verá as abas: Leads, Pipelines e Ações em massa. Clique na aba 'Pipelines' para ver e gerenciar todas as suas pipelines.",
    tip: "💡 A aba 'Leads' mostra o kanban da pipeline selecionada. A aba 'Pipelines' lista todas as pipelines criadas na conta."
  },
  {
    image: "passo-04.png",
    hotspot: { x: 85.5, y: 19.8, w: 10.5, h: 4.2 },
    tooltip: { x: 30, y: 35 },
    line: { x1: 85.5, y1: 22, x2: 58, y2: 42 },
    title: "Clique em '+ Criar Pipeline'",
    text: "No canto superior direito da página de Pipelines, clique no botão azul '+ Criar Pipeline'. Um modal será aberto para configurar sua nova pipeline.",
    tip: "💡 Você pode ter quantas pipelines quiser — por exemplo, uma para vendas, outra para suporte ao cliente, outra para recrutamento."
  },
  {
    image: "passo-05.png",
    hotspot: { x: 27, y: 20, w: 42, h: 4 },
    tooltip: { x: 55, y: 8 },
    line: { x1: 48, y1: 20, x2: 55, y2: 16 },
    title: "Preencha o nome da Pipeline",
    text: "No campo 'Nome do Pipeline', digite um nome descritivo. Neste exemplo, usamos 'Pipeline de Vendas'. Abaixo, a plataforma já cria 4 etapas padrão que você pode personalizar.",
    tip: "💡 Use nomes claros como 'Pipeline de Vendas', 'Funil Comercial', 'CS | Suporte' — facilita encontrar depois."
  },
  {
    image: "passo-06.png",
    hotspot: { x: 28.5, y: 32, w: 43, h: 27.5 },
    tooltip: { x: 5, y: 5 },
    line: { x1: 50, y1: 32, x2: 28, y2: 14 },
    title: "Configure as etapas (stages)",
    text: "Renomeie as etapas para refletir seu processo de vendas. Aqui criamos: Novo Lead → Agendamento → Proposta Enviada → Negociação → Fechamento. Use '+ Adicionar etapa' para criar mais.",
    tip: "💡 As checkboxes 'Gráfico de funil' e 'Etapa de entrega' controlam como cada estágio aparece nos relatórios do dashboard."
  },
  {
    image: "passo-07.png",
    hotspot: { x: 7.5, y: 44, w: 89, h: 3.5 },
    tooltip: { x: 55, y: 8 },
    line: { x1: 50, y1: 44, x2: 55, y2: 20 },
    title: "Pipeline criada com sucesso!",
    text: "Após clicar em 'Criar', a pipeline aparece na lista. Note que 'Pipeline de Vendas' está listada com 5 etapas. Agora vamos visualizá-la no kanban.",
    tip: "💡 Nesta tela você pode editar (ícone de lápis), duplicar ou excluir (ícone de lixeira) qualquer pipeline."
  },
  {
    image: "passo-08.png",
    hotspot: { x: 4, y: 42, w: 94, h: 6.5 },
    tooltip: { x: 55, y: 8 },
    line: { x1: 50, y1: 42, x2: 55, y2: 20 },
    title: "Sua Pipeline no Kanban! 🎉",
    text: "Volte à aba 'Leads' e selecione 'Pipeline de Vendas' no seletor. Pronto! Seu kanban visual está configurado com as 5 etapas: Novo Lead, Agendamento, Proposta Enviada, Negociação e Fechamento.",
    tip: "💡 Agora você pode adicionar oportunidades clicando em '+ Adicionar oportunidade' e arrastar os cards entre as colunas."
  }
];

let currentStep = 0;

function init() {
  const progress = document.getElementById('progress');
  STEPS.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'progress-dot';
    dot.onclick = () => goToStep(i);
    progress.appendChild(dot);
  });
}

function startTutorial() {
  document.getElementById('intro').classList.add('hidden');
  goToStep(0);
}

function goToStep(index) {
  if (index < 0 || index >= STEPS.length) return;
  const step = STEPS[index];
  const img = document.getElementById('screenshot');
  const hotspot = document.getElementById('hotspot');
  const tooltip = document.getElementById('tooltip');
  const line = document.getElementById('connector');

  img.classList.add('fade-out');
  img.classList.remove('fade-in');

  setTimeout(() => {
    img.src = step.image;
    img.onload = () => {
      img.classList.remove('fade-out');
      img.classList.add('fade-in');
    };

    // Frame retangular
    hotspot.style.left = step.hotspot.x + '%';
    hotspot.style.top = step.hotspot.y + '%';
    hotspot.style.width = step.hotspot.w + '%';
    hotspot.style.height = step.hotspot.h + '%';

    // Tooltip
    tooltip.style.left = step.tooltip.x + '%';
    tooltip.style.top = step.tooltip.y + '%';

    // Linha tracejada — coordenadas puramente percentuais via viewBox
    line.setAttribute('x1', step.line.x1);
    line.setAttribute('y1', step.line.y1);
    line.setAttribute('x2', step.line.x2);
    line.setAttribute('y2', step.line.y2);

    // Clamp tooltip dentro do frame (roda após render completo)
    setTimeout(() => {
      const wrapper = document.getElementById('screenshot-wrapper');
      const tt = document.getElementById('tooltip');
      if (!wrapper || !tt) return;
      const wRect = wrapper.getBoundingClientRect();
      const tRect = tt.getBoundingClientRect();
      const pad = 8; // margem interna em px
      let newLeft = parseFloat(tt.style.left);
      let newTop = parseFloat(tt.style.top);
      // Direita
      if (tRect.right > wRect.right - pad) {
        const overflow = tRect.right - (wRect.right - pad);
        newLeft -= (overflow / wRect.width) * 100;
      }
      // Baixo
      if (tRect.bottom > wRect.bottom - pad) {
        const overflow = tRect.bottom - (wRect.bottom - pad);
        newTop -= (overflow / wRect.height) * 100;
      }
      // Esquerda
      if (tRect.left < wRect.left + pad) {
        newLeft = (pad / wRect.width) * 100;
      }
      // Cima
      if (tRect.top < wRect.top + pad) {
        newTop = (pad / wRect.height) * 100;
      }
      tt.style.left = Math.max(1, newLeft) + '%';
      tt.style.top = Math.max(1, newTop) + '%';
    }, 150);

    // Conteúdo
    document.getElementById('tooltip-step').textContent = `Passo ${index + 1} de ${STEPS.length}`;
    document.getElementById('tooltip-title').textContent = step.title;
    document.getElementById('tooltip-text').textContent = step.text;
    const tipEl = document.getElementById('tooltip-tip');
    if (step.tip) {
      tipEl.textContent = step.tip;
      tipEl.style.display = 'block';
    } else {
      tipEl.style.display = 'none';
    }

    // Header e progress
    document.getElementById('header-steps').textContent = `Passo ${index + 1} de ${STEPS.length}`;
    document.querySelectorAll('.progress-dot').forEach((dot, i) => {
      dot.className = 'progress-dot';
      if (i < index) dot.classList.add('completed');
      if (i === index) dot.classList.add('active');
    });

    // Navegação
    document.getElementById('btn-prev').disabled = index === 0;
    const btnNext = document.getElementById('btn-next');
    if (index === STEPS.length - 1) {
      btnNext.innerHTML = '✅ Concluir';
      btnNext.onclick = () => { goToStep(0); document.getElementById('intro').classList.remove('hidden'); };
    } else {
      btnNext.innerHTML = 'Próximo →';
      btnNext.onclick = nextStep;
    }
    currentStep = index;
  }, 200);
}

function nextStep() { goToStep(currentStep + 1); }
function prevStep() { goToStep(currentStep - 1); }

document.addEventListener('keydown', (e) => {
  if (document.getElementById('intro').classList.contains('hidden')) {
    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextStep(); }
    if (e.key === 'ArrowLeft') { e.preventDefault(); prevStep(); }
  } else {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); startTutorial(); }
  }
});

init();
</script>
</body>
</html>
